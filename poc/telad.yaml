# telad configuration — register machines with the hub.
# Each machine gets its own WireGuard tunnel and reconnect loop.

hub: ws://hub:8080
# token: secret              # shared auth token (optional)

machines:
  - name: barn
    # Either `ports:` (shortcut) or `services:` (rich descriptors).
    # ports: [22, 3389]
    services:
      - port: 22
        proto: tcp
        name: SSH
        description: Secure Shell
      - port: 3389
        proto: tcp
        name: RDP
        description: Remote Desktop
    target: host.docker.internal
