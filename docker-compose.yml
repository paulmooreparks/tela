# Tela — Docker Compose
#
# Runs the Go hub (telahubd). All external traffic is routed via cloudflared.
#
# Usage:
#   docker compose up --build

services:
  gohub:
    # Go hub (telahubd) — reachable via gohub.parkscomputing.com.
    build:
      context: .
      dockerfile: docker/gohub/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    container_name: tela-gohub
    ports:
      - "3002:8080"
      - "41820:41820/udp"
    environment:
      - HUB_PORT=8080
      - HUB_UDP_PORT=41820
      - HUB_UDP_HOST=${HUB_UDP_HOST:-}
      - HUB_NAME=gohub
      - TELA_OWNER_TOKEN=${TELA_OWNER_TOKEN:-}
    volumes:
      - hub-data:/app/data
    restart: unless-stopped

volumes:
  hub-data:
