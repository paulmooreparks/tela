# Tela -- Docker Compose
#
# Runs the Go hub (telahubd). All external traffic is routed via cloudflared.
#
# Usage:
#   docker compose up --build

services:
  gohub:
    # Go hub (telahubd) -- reachable via gohub.parkscomputing.com.
    build:
      context: .
      dockerfile: docker/gohub/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    container_name: tela-gohub
    ports:
      - "3002:80"
      - "41820:41820/udp"
    environment:
      - TELAHUBD_PORT=80
      - TELAHUBD_UDP_PORT=41820
      - TELAHUBD_UDP_HOST=${TELAHUBD_UDP_HOST:-}
      - TELAHUBD_NAME=gohub
      - TELA_OWNER_TOKEN=${TELA_OWNER_TOKEN:-}
      - TELAHUBD_PORTAL_URL=${TELAHUBD_PORTAL_URL:-}
      - TELAHUBD_PORTAL_TOKEN=${TELAHUBD_PORTAL_TOKEN:-}
      - TELAHUBD_PUBLIC_URL=${TELAHUBD_PUBLIC_URL:-}
    volumes:
      - hub-data:/app/data
    restart: unless-stopped

volumes:
  hub-data:
