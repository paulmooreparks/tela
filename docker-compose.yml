# Tela POC — Docker Compose
#
# Runs the hub (WS relay + static site), Caddy reverse proxy, and
# telad (WireGuard daemon) that tunnels services on the host.
#
# Usage:
#   docker compose up --build

services:
  caddy:
    # Reverse proxy with auto TLS for direct (non-Cloudflare) access.
    # Uses DNS-01 challenge via Cloudflare API — no port 80 needed.
    # Token stored in .env (not committed).
    build:
      context: ./docker/caddy
    container_name: tela-caddy
    ports:
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    depends_on:
      - hub
    restart: unless-stopped

  hub:
    build:
      context: .
      dockerfile: docker/hub/Dockerfile
    container_name: tela-hub
    ports:
      # HTTP + WebSocket on one port
      # cloudflared routes tela.awansatu.net -> http://localhost:3000
      - "3000:8080"
      # UDP relay for WireGuard datagrams (bypasses TCP-over-TCP)
      - "41820:41820/udp"
    environment:
      - HUB_PORT=8080
      - HUB_UDP_PORT=41820
    restart: unless-stopped

  telad:
    # WireGuard L3 daemon — end-to-end encrypted, multi-port.
    # Uses gVisor netstack (pure userspace, no TUN, no admin).
    # Forwards all listed ports to the Docker host.
    build:
      context: .
      dockerfile: docker/hub/Dockerfile
    container_name: tela-daemon
    entrypoint: ["/usr/local/bin/telad"]
    command:
      - -hub
      - ws://hub:8080
      - -machine
      - barn-wg
      - -ports
      - "22,3389"
      - -target-host
      - host.docker.internal
    depends_on:
      - hub
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
