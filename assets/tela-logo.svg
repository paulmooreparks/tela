<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 64" width="164" height="64">
  <!-- Tela — horizontal lockup: weave icon + wordmark -->

  <!-- Icon -->
  <rect width="54" height="54" x="5" y="5" rx="12" fill="#1a1a2e"/>

  <!-- Weft (horizontal) — #5ee89e -->
  <line x1="13" y1="21" x2="27" y2="21" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="35" y1="21" x2="49" y2="21" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="13" y1="32" x2="17" y2="32" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="25" y1="32" x2="37" y2="32" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="45" y1="32" x2="49" y2="32" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="13" y1="43" x2="27" y2="43" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="35" y1="43" x2="49" y2="43" stroke="#5ee89e" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Warp (vertical) — #7ef0b2 -->
  <line x1="21" y1="13" x2="21" y2="17" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="21" y1="25" x2="21" y2="37" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="21" y1="47" x2="21" y2="51" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="31" y1="13" x2="31" y2="27" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="31" y1="37" x2="31" y2="51" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="41" y1="13" x2="41" y2="17" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="41" y1="25" x2="41" y2="37" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="41" y1="47" x2="41" y2="51" stroke="#7ef0b2" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="72" y="43" font-family="system-ui, -apple-system, sans-serif"
        font-size="30" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">tela</text>
</svg>
