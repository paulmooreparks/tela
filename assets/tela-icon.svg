<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tela — warp & weft weave on dark rounded square -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <!-- Weft (horizontal) threads — mint green #5ee89e -->
  <!-- y=20: continuous except gap at x=32 (warp on top) -->
  <line x1="10" y1="20" x2="27" y2="20" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="37" y1="20" x2="54" y2="20" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>
  <!-- y=32: gaps at x=20 and x=44 (warp on top) -->
  <line x1="10" y1="32" x2="15" y2="32" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="25" y1="32" x2="39" y2="32" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="49" y1="32" x2="54" y2="32" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>
  <!-- y=44: gap at x=32 (warp on top) -->
  <line x1="10" y1="44" x2="27" y2="44" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="37" y1="44" x2="54" y2="44" stroke="#5ee89e" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Warp (vertical) threads — lighter mint #7ef0b2 -->
  <!-- x=20: gaps at y=20 and y=44 (weft on top) -->
  <line x1="20" y1="10" x2="20" y2="15" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="20" y2="39" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="20" y1="49" x2="20" y2="54" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <!-- x=32: gap at y=32 (weft on top) -->
  <line x1="32" y1="10" x2="32" y2="27" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="32" y1="37" x2="32" y2="54" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <!-- x=44: gaps at y=20 and y=44 (weft on top) -->
  <line x1="44" y1="10" x2="44" y2="15" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="44" y1="25" x2="44" y2="39" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="44" y1="49" x2="44" y2="54" stroke="#7ef0b2" stroke-width="4.5" stroke-linecap="round"/>
</svg>
