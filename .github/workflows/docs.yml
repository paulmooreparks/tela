# Build the Tela documentation site with mdBook and publish to GitHub Pages.
#
# The book lives in book/ and pulls most of its chapter content from .md
# files at the repository root via mdBook's {{#include}} preprocessor, so
# the docs and the source code are atomically updated together. There is
# no second source of truth.
#
# Triggered on every push to main that touches docs source. The published
# site lives at https://paulmooreparks.github.io/tela/.

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent docs deployment, but don't cancel an in-progress
# run -- we want it to finish so the previous deployment is consistent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=v0.4.40
          mkdir -p $HOME/.cargo/bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C $HOME/.cargo/bin
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build book
        run: |
          cd book
          mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
