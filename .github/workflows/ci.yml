# Continuous integration: build, vet, and test on every push and PR.
#
# This workflow exists so that broken code never reaches main. It does
# NOT produce release artifacts -- that's release.yml's job. CI is fast
# and runs on Linux only; release.yml is slower and exercises every
# target platform.
#
# What this proves on green:
#   - Every Go package compiles (go build ./...)
#   - go vet has no warnings
#   - All tests pass (go test ./...)
#   - go.mod and go.sum are tidy (no missing or extraneous deps)
#   - The code is gofmt-clean
#
# When this should be expanded:
#   - When the test suite gets large enough that the matrix needs
#     parallelism, split into per-package jobs
#   - When platform-specific bugs surface, add macOS and Windows
#     runners (currently Linux-only because the codebase is portable
#     and a Linux build catches almost everything)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.0"

jobs:
  build:
    name: Build, vet, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the result."
            git diff go.mod go.sum
            exit 1
          fi

      - name: Verify gofmt
        run: |
          UNFORMATTED=$(gofmt -l . 2>&1 || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run 'gofmt -w .' and commit the result."
            exit 1
          fi

      - name: Build all packages
        run: go build ./...

      - name: Vet all packages
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 ./...

  build-cross-platform:
    name: Cross-compile sanity check
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-compile tela, telad, telahubd, telachand
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath ./cmd/tela
          go build -trimpath ./cmd/telad
          go build -trimpath ./cmd/telahubd
          go build -trimpath ./cmd/telachand
