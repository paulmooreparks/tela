# Build tela and telad binaries for all platforms, publish SHA-256 hashes,
# and attach everything to a GitHub Release.
#
# Triggers:
#   - Push to main: creates release vMAJOR.MINOR.PATCH where MAJOR.MINOR
#     comes from the VERSION file and PATCH is the commit count since
#     the vMAJOR.MINOR.0 tag. Bump VERSION and tag vX.Y.0 to reset.
#   - Push a v* tag:  uses the tag name as-is
#
# What this proves to users:
#   - Binaries were built by GitHub Actions (not someone's laptop)
#   - Built from the exact tagged commit (verifiable via source)
#   - SHA-256 checksums are published alongside the binaries
#   - Reproducible: same Go version, same flags, same source → same binary

name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "VERSION"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/release.yml"

  workflow_dispatch: {}

permissions:
  contents: write  # needed to create releases and upload assets

env:
  GO_VERSION: "1.24.4"

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for version computation

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            BASE=$(cat VERSION | tr -d '[:space:]')
            BASE_TAG="v${BASE}.0"
            if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
              PATCH=$(git rev-list --count "${BASE_TAG}..HEAD")
            else
              PATCH=0
            fi
            echo "tag=v${BASE}.${PATCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build tela
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/tela-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/tela

      - name: Build telad
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/telad-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/telad

      - name: Build telahubd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/telahubd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/telahubd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            suffix: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            webkit: "4.1"
            suffix: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-22.04
            ext: ""
            webkit: "4.0"
            suffix: "-gtk40"
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            suffix: ""
          # macOS Intel (macos-13) disabled -- runner availability issues
          # - goos: darwin
          #   goarch: amd64
          #   runner: macos-13
          #   ext: ""
          #   suffix: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for version computation

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            BASE=$(cat VERSION | tr -d '[:space:]')
            BASE_TAG="v${BASE}.0"
            if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
              PATCH=$(git rev-list --count "${BASE_TAG}..HEAD")
            else
              PATCH=0
            fi
            echo "tag=v${BASE}.${PATCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-${{ matrix.webkit || '4.0' }}-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build telavisor
        shell: bash
        run: |
          cd cmd/telagui
          TAGS=""
          if [ "${{ matrix.webkit }}" = "4.1" ]; then
            TAGS="-tags webkit2_41"
          fi
          wails build $TAGS -ldflags="-X main.version=${{ steps.version.outputs.tag }}"

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # macOS: Wails produces a .app bundle (named after wails.json "name")
            cd cmd/telagui/build/bin
            # Find the .app bundle regardless of name
            APP_BUNDLE=$(ls -d *.app 2>/dev/null | head -1)
            if [ -z "$APP_BUNDLE" ]; then
              echo "ERROR: No .app bundle found in build/bin"
              ls -la
              exit 1
            fi
            tar czf telavisor-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz "$APP_BUNDLE"
            mv telavisor-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ../../../../dist/
          else
            cp cmd/telagui/build/bin/telavisor${{ matrix.ext }} \
              dist/telavisor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix || '' }}${{ matrix.ext }}
          fi

      - name: Build Linux packages
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          cd cmd/telagui
          export VERSION="${{ steps.version.outputs.tag }}"
          VERSION="${VERSION#v}"  # strip leading v for nfpm
          export GOARCH="${{ matrix.goarch }}"
          nfpm pkg --packager deb --target ../../dist/telavisor-${{ matrix.goarch }}${{ matrix.suffix || '' }}.deb
          nfpm pkg --packager rpm --target ../../dist/telavisor-${{ matrix.goarch }}${{ matrix.suffix || '' }}.rpm

      - name: Build Windows installer
        if: matrix.goos == 'windows'
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          Write-Host "makensis location:"
          Get-Command makensis -ErrorAction SilentlyContinue | Select-Object Source
          cd cmd/telagui
          # Set version in wails.json so NSIS installer gets the correct version
          $VERSION = "${{ steps.version.outputs.tag }}"
          $VERSION_NUM = $VERSION.TrimStart("v")
          $wailsJson = Get-Content wails.json | ConvertFrom-Json
          $wailsJson.info.productVersion = $VERSION_NUM
          $wailsJson | ConvertTo-Json -Depth 10 | Set-Content wails.json
          wails build -nsis -ldflags="-X main.version=$VERSION"
          Write-Host "Build output:"
          Get-ChildItem -Path build/bin -Recurse | Select-Object FullName, Length
          $installer = Get-ChildItem -Path build/bin -Filter "*installer*" -Recurse | Select-Object -First 1
          if ($installer) {
            Write-Host "Found installer: $($installer.FullName)"
            Copy-Item $installer.FullName -Destination "../../dist/telavisor-windows-amd64-setup.exe"
          } else {
            Write-Host "WARNING: No installer file found in build/bin"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-telavisor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix || '' }}
          path: dist/

  release:
    needs: [build, build-gui]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            BASE=$(cat VERSION | tr -d '[:space:]')
            BASE_TAG="v${BASE}.0"
            if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
              PATCH=$(git rev-list --count "${BASE_TAG}..HEAD")
            else
              PATCH=0
            fi
            echo "tag=v${BASE}.${PATCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums and manifest
        run: |
          cd dist
          sha256sum * | tee SHA256SUMS.txt

          # Build a JSON manifest for easy consumption by web pages
          VERSION="${{ steps.version.outputs.tag }}"
          echo "{\"version\":\"${VERSION}\",\"binaries\":{" > release.json
          first=true
          for f in tela-* telad-* telahubd-* telavisor-*; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            size=$(stat -c%s "$f")
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> release.json
            fi
            printf '"%s":{"sha256":"%s","size":%s}' "$f" "$hash" "$size" >> release.json
          done
          echo '}}' >> release.json

          # Pretty-print for readability
          python3 -m json.tool release.json > release-pretty.json
          mv release-pretty.json release.json

      - name: Create or update tag (for main branch builds)
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'refs/tags/${{ steps.version.outputs.tag }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tag,
                sha: context.sha,
              });
            } catch (e) {
              if (e.status === 422) {
                // Tag already exists -- update it to this commit
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'tags/${{ steps.version.outputs.tag }}',
                  sha: context.sha,
                  force: true,
                });
              } else {
                throw e;
              }
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
