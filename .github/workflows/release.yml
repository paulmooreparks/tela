# Build tela and telad binaries for all platforms, publish SHA-256 hashes,
# and attach everything to a GitHub Release.
#
# Triggers:
#   - Push to main: creates release v0.1.<run_number>
#   - Push a v* tag:  uses the tag name as-is
#
# What this proves to users:
#   - Binaries were built by GitHub Actions (not someone's laptop)
#   - Built from the exact tagged commit (verifiable via source)
#   - SHA-256 checksums are published alongside the binaries
#   - Reproducible: same Go version, same flags, same source → same binary

name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write  # needed to create releases and upload assets

env:
  GO_VERSION: "1.24.4"

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build tela
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/tela-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/tela

      - name: Build telad
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/telad-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/telad

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums and manifest
        run: |
          cd dist
          sha256sum * | tee SHA256SUMS.txt

          # Build a JSON manifest for easy consumption by web pages
          VERSION="${{ steps.version.outputs.tag }}"
          echo "{\"version\":\"${VERSION}\",\"binaries\":{" > release.json
          first=true
          for f in tela-* telad-*; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            size=$(stat -c%s "$f")
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> release.json
            fi
            printf '"%s":{"sha256":"%s","size":%s}' "$f" "$hash" "$size" >> release.json
          done
          echo '}}' >> release.json

          # Pretty-print for readability
          python3 -m json.tool release.json > release-pretty.json
          mv release-pretty.json release.json

      - name: Create tag (for main branch builds)
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.version.outputs.tag }}',
              sha: context.sha,
            });

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
