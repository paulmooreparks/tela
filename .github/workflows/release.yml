# Build tela, telad, and telahubd binaries for all platforms,
# publish SHA-256 hashes, and attach everything to a GitHub Release.
#
# Triggers:
#   - Push to main: creates release vMAJOR.MINOR.PATCH where MAJOR.MINOR
#     comes from the VERSION file and PATCH is the commit count since
#     the vMAJOR.MINOR.0 tag. Bump VERSION and tag vX.Y.0 to reset.
#   - Push a v* tag:  uses the tag name as-is
#
# What this proves to users:
#   - Binaries were built by GitHub Actions (not someone's laptop)
#   - Built from the exact tagged commit (verifiable via source)
#   - SHA-256 checksums are published alongside the binaries
#   - Reproducible: same Go version, same flags, same source → same binary

name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "VERSION"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/release.yml"

  workflow_dispatch: {}

  # Called from promote.yml after it creates a beta or stable tag.
  # Tags pushed by GITHUB_TOKEN don't trigger the on.push.tags handler
  # above (GitHub blocks this to prevent workflow loops), so promotion
  # has to invoke release.yml explicitly via workflow_call.
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.5.0-beta.1). Must already exist on the remote."
        required: true
        type: string

permissions:
  contents: write  # needed to create releases and upload assets
  packages: write  # needed to push telahubd images to ghcr.io

env:
  GO_VERSION: "1.25.0"

jobs:
  # Resolve the tag exactly once at the top of the run, then reserve it
  # by creating it on the remote immediately. This eliminates two races:
  #
  #  1. The "two pushes in flight, both compute the same dev counter"
  #     race that previously let one run silently force-overwrite the
  #     other's tag (because of force:true on the updateRef path).
  #
  #  2. The "different jobs in the same run compute different counters"
  #     race that could happen if the build matrix and the release job
  #     each ran their own git-rev-list-count.
  #
  # The dev counter is now derived from the highest existing dev tag
  # for the current MAJOR.MINOR (queried from the GitHub API) plus one,
  # not from the local commit count. That makes it monotonic across
  # runs and immune to fast-forward / rebase weirdness.
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_new_tag: ${{ steps.version.outputs.is_new_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Compute and reserve tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          if [[ -n "${{ inputs.tag }}" ]]; then
            # Called via workflow_call (from promote.yml). The caller
            # already created and pushed the tag; we just use it.
            TAG="${{ inputs.tag }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "is_new_tag=false" >> "$GITHUB_OUTPUT"
            echo "Using caller-supplied tag: $TAG"
            exit 0
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Manual tag push: use the tag verbatim.
            TAG="${{ github.ref_name }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "is_new_tag=false" >> "$GITHUB_OUTPUT"
            echo "Using pushed tag: $TAG"
            exit 0
          fi

          # Main-branch push: synthesize a dev tag of the form
          # vX.Y.0-dev.N where N is one greater than the highest
          # existing -dev tag for the same MAJOR.MINOR. The previous
          # implementation used `git rev-list --count` which is racy
          # across concurrent runs and produces gaps when commits land
          # quickly. Using the GitHub API for "what tags exist on the
          # remote right now" makes the answer authoritative.
          BASE=$(cat VERSION | tr -d '[:space:]')
          PREFIX="v${BASE}.0-dev."
          # Page through the repo's tags. 100 per page is the API max.
          # MAJOR.MINOR cycles in ~100 commits between version bumps so
          # one page is enough; if it isn't, the loop will catch it.
          MAX=0
          PAGE=1
          while :; do
            RESULT=$(gh api -X GET "repos/$REPO/tags" -F per_page=100 -F page=$PAGE --jq '.[].name' || true)
            if [ -z "$RESULT" ]; then
              break
            fi
            while IFS= read -r tag; do
              case "$tag" in
                "${PREFIX}"*)
                  N="${tag#$PREFIX}"
                  if [[ "$N" =~ ^[0-9]+$ ]] && [ "$N" -gt "$MAX" ]; then
                    MAX="$N"
                  fi
                  ;;
              esac
            done <<< "$RESULT"
            COUNT=$(echo "$RESULT" | wc -l)
            if [ "$COUNT" -lt 100 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
            if [ "$PAGE" -gt 20 ]; then
              echo "::error::tag pagination ran past 2000 entries; aborting to avoid an infinite loop"
              exit 1
            fi
          done
          NEXT=$((MAX + 1))
          TAG="${PREFIX}${NEXT}"
          echo "Highest existing dev tag for v${BASE}: ${MAX} -> next: ${NEXT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_new_tag=true" >> "$GITHUB_OUTPUT"

          # Reserve the tag by creating it now. If a concurrent run
          # picked the same number, the second createRef call will
          # fail with 422 and the whole workflow will fail noisily --
          # which is what we want, instead of a silent overwrite.
          SHA=$(git rev-parse HEAD)
          echo "Reserving tag $TAG at $SHA"
          gh api -X POST "repos/$REPO/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA"

  # Gate the build on the CI workflow completing successfully for the
  # same commit. Without this, a passing Build can produce downloadable
  # binaries from code that fails CI (e.g. race conditions caught by
  # -race). Uses the gh CLI to poll for the CI run status.
  wait-for-ci:
    runs-on: ubuntu-latest
    # Skip for workflow_call (promote) and tag pushes: those commits
    # already passed CI when they were on main.
    if: inputs.tag == '' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Wait for CI to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for CI workflow to complete on $SHA..."
          for i in $(seq 1 60); do
            STATUS=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
              --jq '.check_runs[] | select(.name == "Build, vet, test") | .status + ":" + .conclusion' \
              2>/dev/null || echo "")
            if [ -z "$STATUS" ]; then
              echo "  CI check not found yet (attempt $i/60)..."
              sleep 5
              continue
            fi
            case "$STATUS" in
              completed:success)
                echo "CI passed."
                exit 0
                ;;
              completed:*)
                echo "::error::CI failed ($STATUS). Aborting build."
                exit 1
                ;;
              *)
                echo "  CI still running ($STATUS, attempt $i/60)..."
                sleep 5
                ;;
            esac
          done
          echo "::error::Timed out waiting for CI after 5 minutes."
          exit 1

  build:
    needs: [compute-version, wait-for-ci]
    # Always run when wait-for-ci was skipped (tag/promote paths).
    if: always() && (needs.wait-for-ci.result == 'success' || needs.wait-for-ci.result == 'skipped')
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for version computation
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          echo "tag=${{ needs.compute-version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build tela
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/tela-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/tela

      - name: Build telad
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/telad-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/telad

      - name: Build telahubd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/telahubd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/telahubd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  build-gui:
    needs: compute-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            suffix: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            webkit: "4.1"
            suffix: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-22.04
            ext: ""
            webkit: "4.0"
            suffix: "-gtk40"
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            suffix: ""
          # macOS Intel (macos-13) disabled -- runner availability issues
          # - goos: darwin
          #   goarch: amd64
          #   runner: macos-13
          #   ext: ""
          #   suffix: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for version computation
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "tag=${{ needs.compute-version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-${{ matrix.webkit || '4.0' }}-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build telavisor
        shell: bash
        run: |
          cd cmd/telagui
          TAGS=""
          if [ "${{ matrix.webkit }}" = "4.1" ]; then
            TAGS="-tags webkit2_41"
          fi
          wails build $TAGS -ldflags="-X main.version=${{ steps.version.outputs.tag }}"

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # macOS: Wails produces a .app bundle (named after wails.json "name")
            cd cmd/telagui/build/bin
            # Find the .app bundle regardless of name
            APP_BUNDLE=$(ls -d *.app 2>/dev/null | head -1)
            if [ -z "$APP_BUNDLE" ]; then
              echo "ERROR: No .app bundle found in build/bin"
              ls -la
              exit 1
            fi
            tar czf telavisor-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz "$APP_BUNDLE"
            mv telavisor-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ../../../../dist/
          else
            cp cmd/telagui/build/bin/telavisor${{ matrix.ext }} \
              dist/telavisor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix || '' }}${{ matrix.ext }}
          fi

      - name: Build Linux packages
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          cd cmd/telagui
          export VERSION="${{ steps.version.outputs.tag }}"
          VERSION="${VERSION#v}"  # strip leading v for nfpm
          export GOARCH="${{ matrix.goarch }}"
          nfpm pkg --packager deb --target ../../dist/telavisor-${{ matrix.goarch }}${{ matrix.suffix || '' }}.deb
          nfpm pkg --packager rpm --target ../../dist/telavisor-${{ matrix.goarch }}${{ matrix.suffix || '' }}.rpm

      - name: Build Windows installer
        if: matrix.goos == 'windows'
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          Write-Host "makensis location:"
          Get-Command makensis -ErrorAction SilentlyContinue | Select-Object Source
          cd cmd/telagui
          # Set version in wails.json so the NSIS installer's VIFileVersion
          # field is set correctly. NSIS requires strict X.X.X.X numeric
          # format -- no prerelease suffixes -- so we map the channel tag
          # shape to four numeric components:
          #   v0.5.0           -> 0.5.0.0   (stable)
          #   v0.5.0-dev.112   -> 0.5.0.112 (dev)
          #   v0.5.0-beta.3    -> 0.5.0.3   (beta)
          $VERSION = "${{ steps.version.outputs.tag }}"
          $RAW = $VERSION.TrimStart("v")
          if ($RAW -match '^(\d+\.\d+\.\d+)(?:-(?:dev|beta)\.(\d+))?$') {
            $base = $Matches[1]
            $suffix = if ($Matches[2]) { $Matches[2] } else { "0" }
            $VERSION_NUM = "$base.$suffix"
          } else {
            # Fallback: strip any non-numeric, non-dot characters and pad
            # to four components. Should never hit this path with the
            # known channel tag shapes.
            $VERSION_NUM = ($RAW -replace '[^0-9.]', '')
            while (($VERSION_NUM -split '\.').Count -lt 4) { $VERSION_NUM += ".0" }
          }
          Write-Host "wails.json productVersion: $VERSION_NUM (from tag $VERSION)"
          $wailsJson = Get-Content wails.json | ConvertFrom-Json
          $wailsJson.info.productVersion = $VERSION_NUM
          $wailsJson | ConvertTo-Json -Depth 10 | Set-Content wails.json
          wails build -nsis -ldflags="-X main.version=$VERSION"
          Write-Host "Build output:"
          Get-ChildItem -Path build/bin -Recurse | Select-Object FullName, Length
          $installer = Get-ChildItem -Path build/bin -Filter "*installer*" -Recurse | Select-Object -First 1
          if ($installer) {
            Write-Host "Found installer: $($installer.FullName)"
            Copy-Item $installer.FullName -Destination "../../dist/telavisor-windows-amd64-setup.exe"
          } else {
            Write-Host "WARNING: No installer file found in build/bin"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-telavisor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix || '' }}
          path: dist/

  release:
    needs: [compute-version, build, build-gui]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for version computation
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          echo "tag=${{ needs.compute-version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Determine channel from tag
        id: channel
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [[ "$TAG" =~ -dev\.[0-9]+$ ]]; then
            CHANNEL="dev"
          elif [[ "$TAG" =~ -beta\.[0-9]+$ ]]; then
            CHANNEL="beta"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
          else
            echo "::warning::Tag '$TAG' does not match any known channel shape; defaulting to dev"
            CHANNEL="dev"
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG belongs to channel $CHANNEL"

      - name: Generate checksums and manifests
        run: |
          cd dist
          sha256sum * | tee SHA256SUMS.txt

          VERSION="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.channel.outputs.channel }}"
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION}/"

          # Per-release manifest (legacy slim shape, kept for existing consumers)
          echo "{\"version\":\"${VERSION}\",\"binaries\":{" > release.json
          first=true
          for f in tela-* telad-* telahubd-* telavisor-*; do
            [ -e "$f" ] || continue
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            size=$(stat -c%s "$f")
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> release.json
            fi
            printf '"%s":{"sha256":"%s","size":%s}' "$f" "$hash" "$size" >> release.json
          done
          echo '}}' >> release.json
          python3 -m json.tool release.json > release-pretty.json
          mv release-pretty.json release.json

          # Channel manifest (canonical, see channels/schema.json)
          {
            echo "{"
            echo "  \"channel\": \"${CHANNEL}\","
            echo "  \"version\": \"${VERSION}\","
            echo "  \"tag\": \"${VERSION}\","
            echo "  \"publishedAt\": \"${PUBLISHED_AT}\","
            echo "  \"downloadBase\": \"${DOWNLOAD_BASE}\","
            echo "  \"binaries\": {"
            first=true
            for f in tela-* telad-* telahubd-* telavisor-*; do
              [ -e "$f" ] || continue
              hash=$(sha256sum "$f" | cut -d' ' -f1)
              size=$(stat -c%s "$f")
              if [ "$first" = true ]; then
                first=false
              else
                echo ","
              fi
              printf '    "%s": { "sha256": "%s", "size": %s }' "$f" "$hash" "$size"
            done
            echo ""
            echo "  }"
            echo "}"
          } > "${CHANNEL}.json"
          python3 -m json.tool "${CHANNEL}.json" > "${CHANNEL}-pretty.json"
          mv "${CHANNEL}-pretty.json" "${CHANNEL}.json"
          cat "${CHANNEL}.json"

      # The tag is already reserved by the compute-version job at the
      # top of the run, so we no longer need a Create-or-update-tag step
      # here. Concurrent runs that picked the same dev counter would
      # have failed in compute-version, not silently overwritten each
      # other here.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish channel manifest
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
          REPO: ${{ github.repository }}
        run: |
          # The "channels" release is a rolling, never-deleted release that
          # hosts the three channel manifests as assets. Self-update on every
          # Tela binary fetches its channel's JSON from here.
          set -e
          cd dist

          # Make sure the channels release exists. Create it pinned to a
          # zero-tag if not.
          if ! gh release view channels --repo "$REPO" >/dev/null 2>&1; then
            echo "Creating 'channels' rolling release"
            gh release create channels \
              --repo "$REPO" \
              --title "Channel manifests" \
              --notes "Rolling release that hosts dev.json, beta.json, and stable.json. Each manifest names the current tag for its channel and lists every binary published under that tag with its SHA-256. See RELEASE-PROCESS.md and channels/schema.json for the model."
          fi

          # Replace the asset for this channel.
          gh release upload channels "${CHANNEL}.json" \
            --repo "$REPO" \
            --clobber

          echo "Updated ${CHANNEL}.json on the 'channels' release"

  # Build and push the telahubd Docker image to ghcr.io. See DESIGN-docker.md
  # for the tag strategy and the rationale behind not publishing dev-channel
  # builds. The image is a source build of ./cmd/telahubd layered on
  # gcr.io/distroless/static-debian12:nonroot (see Dockerfile.telahubd).
  #
  # Triggered on beta and stable tags only. Dev builds skip this job so
  # ghcr.io does not accumulate short-lived tags. Operators who want to
  # run a dev build via Docker rebuild Dockerfile.telahubd locally from
  # the dev tag's source.
  docker-publish:
    needs: [compute-version, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Determine channel from tag
        id: channel
        run: |
          TAG="${{ needs.compute-version.outputs.tag }}"
          if [[ "$TAG" =~ -dev\.[0-9]+$ ]]; then
            CHANNEL="dev"
          elif [[ "$TAG" =~ -beta\.[0-9]+$ ]]; then
            CHANNEL="beta"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
          else
            CHANNEL="dev"
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Skip dev builds
        if: steps.channel.outputs.channel == 'dev'
        run: |
          echo "Channel is dev; skipping Docker publish (see DESIGN-docker.md section 12.1)."

      - name: Checkout source
        if: steps.channel.outputs.channel != 'dev'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Compute image tags
        if: steps.channel.outputs.channel != 'dev'
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/telahubd"
          # Normalise the owner to lowercase; ghcr rejects mixed case.
          IMAGE="${IMAGE,,}"
          TAG="${{ steps.channel.outputs.tag }}"
          CHANNEL="${{ steps.channel.outputs.channel }}"
          TAGS="${IMAGE}:${TAG}"
          case "$CHANNEL" in
            beta)
              TAGS="${TAGS},${IMAGE}:beta"
              ;;
            stable)
              TAGS="${TAGS},${IMAGE}:stable,${IMAGE}:latest"
              ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Tags to publish:"
          echo "$TAGS" | tr ',' '\n' | sed 's/^/  /'

      - name: Set up QEMU
        if: steps.channel.outputs.channel != 'dev'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.channel.outputs.channel != 'dev'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.channel.outputs.channel != 'dev'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.channel.outputs.channel != 'dev'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.telahubd
          platforms: linux/amd64,linux/arm64
          build-args: |
            TELA_VERSION=${{ steps.channel.outputs.tag }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.channel.outputs.tag }}
