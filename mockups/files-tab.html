<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TelaVisor Mockup - Files Tab</title>
<link rel="stylesheet" href="../cmd/telagui/frontend/src/style.css">
<style>
.topbar, .app-brand, .mode-toggle, .topbar-icon-btn, .topbar-btn, .mode-btn { -webkit-app-region: unset !important; }
.app-title-visor { color: var(--accent); }

#tab-status, #tab-profile, #tab-agents, #tab-hubs { display: none !important; }
#tab-files { display: flex !important; }

/* ===== Files Tab ===== */

.files-pane {
  display: flex; flex-direction: column; height: 100%; overflow: hidden;
}

/* Address bar */
.files-addressbar {
  display: flex; align-items: center; gap: 6px; padding: 5px 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--surface);
}
.files-nav-btn {
  background: none; border: 1px solid var(--border); width: 26px; height: 26px;
  border-radius: 4px; font-size: 13px; cursor: pointer; color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0; flex-shrink: 0;
}
.files-nav-btn:hover:not(:disabled) { background: var(--surface-alt); color: var(--text); border-color: var(--text-muted); }
.files-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.files-path {
  display: flex; align-items: center; flex: 1; min-width: 0;
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; gap: 0; overflow: hidden;
}
.files-path-seg {
  font-size: 12px; font-family: var(--font); color: var(--text);
  cursor: pointer; padding: 1px 4px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
}
.files-path-seg:hover { background: rgba(255,255,255,0.08); }
.files-path-seg.root { font-weight: 600; }
.files-path-sep { color: var(--text-muted); font-size: 11px; margin: 0 1px; flex-shrink: 0; pointer-events: none; }
.files-nav-btn.refresh-btn { margin-left: 2px; }

/* Action bar (below address bar) */
.files-actionbar {
  display: flex; align-items: center; gap: 4px; padding: 4px 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.files-action-btn {
  background: none; border: 1px solid var(--border); padding: 3px 10px;
  border-radius: 4px; font-size: 12px; cursor: pointer; color: var(--text-muted);
  font-family: var(--font); white-space: nowrap;
}
.files-action-btn:hover:not(:disabled) { background: var(--surface-alt); color: var(--text); }
.files-action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.files-action-btn.danger:hover:not(:disabled) { color: var(--danger); border-color: var(--danger); }

/* Column header */
.files-header {
  display: flex; align-items: center; padding: 0 16px; height: 28px;
  border-bottom: 1px solid var(--border); font-size: 11px;
  font-weight: 600; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px; flex-shrink: 0; background: var(--bg);
}
.fh-name { flex: 1; min-width: 0; cursor: pointer; padding: 0 4px; display: flex; align-items: center; gap: 4px; }
.fh-modified { width: 160px; cursor: pointer; padding: 0 4px; }
.fh-type { width: 110px; cursor: pointer; padding: 0 4px; }
.fh-size { width: 80px; text-align: right; cursor: pointer; padding: 0 8px 0 4px; }
.fh-col:hover { color: var(--text); }
.fh-sort-arrow { font-size: 8px; }

/* Scroll area */
.files-scroll { flex: 1; overflow-y: auto; }

/* Entry row */
.files-entry {
  display: flex; align-items: center; padding: 0 16px; height: 28px;
  border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px;
  cursor: default; user-select: none;
}
.files-entry:hover { background: rgba(94, 232, 158, 0.10); }
.files-entry.selected { background: rgba(94, 232, 158, 0.20); }
.files-entry.selected:hover { background: rgba(94, 232, 158, 0.25); }
.files-entry-dir { cursor: pointer; }

.fe-name {
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; display: flex; align-items: center; gap: 8px; padding: 0 4px;
}
.fe-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Classic folder icon (CSS-drawn) */
.fe-icon-dir {
  width: 18px; height: 14px; position: relative; flex-shrink: 0;
}
.fe-icon-dir::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 8px; height: 3px; background: #e8b230; border-radius: 2px 2px 0 0;
}
.fe-icon-dir::after {
  content: ''; position: absolute; top: 3px; left: 0;
  width: 18px; height: 11px; background: #f0c040; border-radius: 0 2px 2px 2px;
}

/* Classic file icon (CSS-drawn) */
.fe-icon-file {
  width: 14px; height: 17px; position: relative; flex-shrink: 0; margin: 0 2px;
}
.fe-icon-file::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 10px; height: 17px; background: #c8cdd3; border-radius: 1px 0 1px 1px;
}
.fe-icon-file::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 0; height: 0; border-style: solid; border-width: 0 4px 5px 0;
  border-color: transparent var(--bg) transparent transparent;
}

/* Machine icon */
.fe-icon-machine {
  width: 16px; height: 14px; position: relative; flex-shrink: 0; margin: 0 1px;
}
.fe-icon-machine::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 16px; height: 10px; background: #4b8bbf; border-radius: 2px;
  border: 1px solid #3a7ab0; box-sizing: border-box;
}
.fe-icon-machine::after {
  content: ''; position: absolute; bottom: 0; left: 4px;
  width: 8px; height: 3px; background: #64748b; border-radius: 0 0 1px 1px;
}

.fe-modified { width: 160px; color: var(--text-muted); font-size: 11px; padding: 0 4px; }
.fe-type { width: 110px; color: var(--text-muted); font-size: 11px; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fe-size {
  width: 80px; text-align: right; padding: 0 8px 0 4px;
  color: var(--text-muted); font-family: var(--mono); font-size: 11px;
}

/* Status bar */
.files-status {
  display: flex; align-items: center; gap: 16px; padding: 3px 16px;
  border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
  flex-shrink: 0; background: var(--surface);
}
.files-status-sep { width: 1px; height: 12px; background: var(--border); }
.files-status-mode {
  margin-left: auto; display: flex; align-items: center; gap: 4px;
}
.files-status-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}
.files-status-dot.rw { background: var(--accent); }
.files-status-dot.ro { background: #f59e0b; }

/* Progress */
.files-progress {
  display: none; align-items: center; gap: 8px; padding: 4px 16px;
  border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
  flex-shrink: 0; background: var(--surface);
}
.files-progress.active { display: flex; }
.files-progress-bar {
  flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.files-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.2s;
}

/* Machine list */
.files-machine-list { flex: 1; overflow-y: auto; padding: 16px; }
.files-machine-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 8px; cursor: pointer;
}
.files-machine-card:hover:not(.disabled) { border-color: var(--text-muted); background: var(--surface-alt); }
.files-machine-card.disabled { opacity: 0.45; cursor: default; }
.files-machine-name { font-weight: 600; font-size: 13px; }
.files-machine-meta { font-size: 11px; color: var(--text-muted); }
.files-machine-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.files-machine-status.online { background: var(--accent); }
.files-machine-status.offline { background: var(--text-muted); }
.files-machine-status.disconnected { background: var(--danger); }
.files-machine-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: auto;
  background: rgba(94, 232, 158, 0.1); color: var(--accent); border: 1px solid rgba(94, 232, 158, 0.2);
}
.files-machine-badge.ro { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
.files-machine-badge.none { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border-color: var(--border); }
.files-machine-badge.off { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }

/* Empty state */
.files-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; color: var(--text-muted); font-size: 13px; gap: 8px; padding: 32px;
}
</style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="app-brand" title="About TelaVisor">
        <img src="../cmd/telagui/frontend/src/logo.png" class="app-logo" alt="Tela" onerror="this.style.display='none'">
        <span class="app-title">Tela<span class="app-title-visor">Visor</span></span>
      </a>
    </div>
    <div class="topbar-center">
      <div class="mode-toggle">
        <button class="mode-btn active">Clients</button>
        <button class="mode-btn middle">Agents</button>
        <button class="mode-btn">Hubs</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-icon-btn topbar-conn-btn" id="conn-icon" title="Connection status" style="color: #94a3b8;">&#x1F517;</button>
      <button class="topbar-icon-btn" title="About">i</button>
      <button class="topbar-icon-btn" title="Settings">&#x2699;</button>
      <button class="topbar-icon-btn" title="Quit" style="color: var(--danger);">&#x2715;</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="main-tab-bar" role="tablist">
    <button class="main-tab">Status</button>
    <button class="main-tab">Profiles</button>
    <button class="main-tab active">Files</button>
    <div class="tab-bar-spacer"></div>
    <button class="topbar-btn connect-btn" id="conn-btn" onclick="toggleConnect()">Connect</button>
  </div>

  <!-- FILES TAB -->
  <div class="tab-pane" role="tabpanel" id="tab-files">
    <div class="files-pane">

      <!-- Address bar -->
      <div class="files-addressbar">
        <button type="button" class="files-nav-btn" id="btn-back" onclick="goBack()" disabled title="Back">&#x2190;</button>
        <button type="button" class="files-nav-btn" id="btn-up" onclick="goUp()" disabled title="Up one level">&#x2191;</button>
        <div class="files-path" id="files-path"></div>
        <button type="button" class="files-nav-btn refresh-btn" onclick="mockRefresh(this)" title="Refresh">&#x21BB;</button>
      </div>

      <!-- Action bar -->
      <div class="files-actionbar" id="files-actionbar" style="display: none;">
        <button type="button" class="files-action-btn" id="btn-upload" onclick="mockUpload()" disabled>Upload</button>
        <button type="button" class="files-action-btn" id="btn-download" onclick="mockDownload()" disabled>Download</button>
        <button type="button" class="files-action-btn danger" id="btn-delete" onclick="mockDelete()" disabled>Delete</button>
        <div class="tab-bar-spacer"></div>
        <span id="selection-info" style="font-size: 11px; color: var(--text-muted);"></span>
      </div>

      <!-- Column headers -->
      <div class="files-header" id="files-header" style="display: none;">
        <span class="fh-name fh-col" onclick="mockSort(this)">Name <span class="fh-sort-arrow">&#x25B2;</span></span>
        <span class="fh-modified fh-col" onclick="mockSort(this)">Date modified</span>
        <span class="fh-type fh-col" onclick="mockSort(this)">Type</span>
        <span class="fh-size fh-col" onclick="mockSort(this)">Size</span>
      </div>

      <!-- Content -->
      <div class="files-scroll" id="files-content"></div>

      <!-- Status bar -->
      <div class="files-status" id="files-status">
        <span id="status-counts">3 machines</span>
      </div>

      <!-- Progress -->
      <div class="files-progress" id="files-progress">
        <span id="files-progress-label">Uploading...</span>
        <div class="files-progress-bar"><div class="files-progress-fill" id="files-progress-fill" style="width: 0%"></div></div>
        <span id="files-progress-pct">0%</span>
      </div>

    </div>
  </div>

  <!-- Log panel -->
  <div style="height: 100px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column;">
    <div style="display: flex; align-items: center; padding: 4px 12px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 16px;">
      <span style="font-size: 11px; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span> TelaVisor</span>
      <span style="font-size: 11px; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span> tela</span>
      <span style="font-size: 11px; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span> Commands</span>
    </div>
    <div id="log-output" style="padding: 6px 12px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); overflow-y: auto; flex: 1;"></div>
  </div>
</div>

<script>
// ===== State =====
var isConnected = false;
var currentView = 'machines'; // 'machines' | 'files'
var currentMachine = '';
var currentPath = '';
var navHistory = [];
var selectedIndices = new Set();
var lastClickedIndex = -1;
var currentEntries = [];

var machines = [
  { name: 'barn', hub: 'gohub.parkscomputing.com', fileShare: 'rw', services: 'SSH :22, RDP :3389' },
  { name: 'telaboard', hub: 'gohub.parkscomputing.com', fileShare: null, services: 'Web :8000, API :8080' },
  { name: 'gohub', hub: 'gohub.parkscomputing.com', fileShare: 'ro', services: 'SSH :22' }
];

var mockFiles = {
  'barn:': [
    { name: 'stuff', isDir: true, modTime: '2026-03-20T22:23:00Z', items: 5 },
    { name: 'audio-workflow-guide.md', isDir: false, modTime: '2026-03-20T22:06:00Z', size: 2148, type: 'Markdown' },
    { name: 'test-for-echo.txt', isDir: false, modTime: '2026-03-20T21:58:00Z', size: 52, type: 'Text' }
  ],
  'barn:stuff': [
    { name: 'logs', isDir: true, modTime: '2026-03-20T21:00:00Z', items: 4 },
    { name: 'backups', isDir: true, modTime: '2026-03-19T15:30:00Z', items: 3 },
    { name: 'app-config.yaml', isDir: false, modTime: '2026-03-20T20:12:00Z', size: 1340, type: 'YAML' },
    { name: 'deploy.log', isDir: false, modTime: '2026-03-20T19:45:00Z', size: 148700, type: 'Log file' },
    { name: 'notes.txt', isDir: false, modTime: '2026-03-19T14:22:00Z', size: 892, type: 'Text' }
  ],
  'barn:stuff/logs': [
    { name: 'app-error.log', isDir: false, modTime: '2026-03-20T23:01:00Z', size: 46200, type: 'Log file' },
    { name: 'access-2026-03-20.log', isDir: false, modTime: '2026-03-20T23:00:00Z', size: 234100, type: 'Log file' },
    { name: 'access-2026-03-19.log', isDir: false, modTime: '2026-03-19T23:59:00Z', size: 198400, type: 'Log file' },
    { name: 'telad.log', isDir: false, modTime: '2026-03-20T22:58:00Z', size: 12400, type: 'Log file' }
  ],
  'barn:stuff/backups': [
    { name: 'telad.yaml.20260318', isDir: false, modTime: '2026-03-18T07:00:00Z', size: 420, type: 'YAML' },
    { name: 'telad.yaml.20260315', isDir: false, modTime: '2026-03-15T07:00:00Z', size: 398, type: 'YAML' },
    { name: 'telad.yaml.20260310', isDir: false, modTime: '2026-03-10T07:00:00Z', size: 380, type: 'YAML' }
  ],
  'gohub:': [
    { name: 'telahubd.yaml', isDir: false, modTime: '2026-03-18T10:00:00Z', size: 420, type: 'YAML' },
    { name: 'hub.log', isDir: false, modTime: '2026-03-20T23:10:00Z', size: 89200, type: 'Log file' }
  ]
};

// ===== Connect/Disconnect =====

function toggleConnect() {
  isConnected = !isConnected;
  var btn = document.getElementById('conn-btn');
  var icon = document.getElementById('conn-icon');
  if (isConnected) {
    btn.textContent = 'Disconnect';
    btn.style.background = 'var(--danger)';
    btn.style.color = '#fff';
    btn.style.borderColor = 'var(--danger)';
    icon.style.color = 'var(--accent)';
    icon.style.borderColor = 'var(--accent)';
    appendLog('Connected (3 machines)');
  } else {
    btn.textContent = 'Connect';
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
    icon.style.color = '#94a3b8';
    icon.style.borderColor = 'rgba(255,255,255,0.2)';
    currentMachine = '';
    currentPath = '';
    navHistory = [];
    appendLog('Disconnected');
  }
  currentView = 'machines';
  clearSelection();
  renderMachineList();
}

// ===== Navigation =====

function renderMachineList() {
  currentView = 'machines';
  document.getElementById('files-header').style.display = 'none';
  document.getElementById('files-actionbar').style.display = 'none';
  document.getElementById('btn-back').disabled = true;
  document.getElementById('btn-up').disabled = true;
  renderPath();

  var html = '<div class="files-machine-list">';
  machines.forEach(function (m) {
    var statusClass = isConnected ? 'online' : 'disconnected';
    var badge = '';
    var disabled = false;

    if (!isConnected) {
      badge = '<span class="files-machine-badge off">disconnected</span>';
      disabled = true;
    } else if (m.fileShare === 'rw') {
      badge = '<span class="files-machine-badge">read-write</span>';
    } else if (m.fileShare === 'ro') {
      badge = '<span class="files-machine-badge ro">read-only</span>';
    } else {
      badge = '<span class="files-machine-badge none">no file share</span>';
      disabled = true;
    }

    var onclick = disabled ? '' : ' onclick="openMachine(\'' + m.name + '\')"';
    var cls = disabled ? ' disabled' : '';

    html += '<div class="files-machine-card' + cls + '"' + onclick + '>'
      + '<span class="files-machine-status ' + statusClass + '"></span>'
      + '<span class="fe-icon-machine"></span>'
      + '<div>'
      + '<div class="files-machine-name">' + m.name + '</div>'
      + '<div class="files-machine-meta">' + m.hub + ' &middot; ' + m.services + '</div>'
      + '</div>'
      + badge
      + '</div>';
  });
  html += '</div>';

  document.getElementById('files-content').innerHTML = html;
  document.getElementById('status-counts').textContent = machines.length + ' machines';
}

function openMachine(name) {
  currentMachine = name;
  currentPath = '';
  navHistory = ['machines'];
  clearSelection();
  renderFileList();
}

function navigateTo(path) {
  navHistory.push(currentMachine + ':' + currentPath);
  currentPath = path;
  clearSelection();
  renderFileList();
}

function goBack() {
  if (navHistory.length === 0) return;
  var prev = navHistory.pop();
  if (prev === 'machines') { currentView = 'machines'; currentMachine = ''; currentPath = ''; clearSelection(); renderMachineList(); return; }
  var parts = prev.split(':');
  currentMachine = parts[0];
  currentPath = parts[1] || '';
  clearSelection();
  renderFileList();
}

function goUp() {
  if (!currentMachine) return;
  if (!currentPath) { currentView = 'machines'; currentMachine = ''; navHistory = []; clearSelection(); renderMachineList(); return; }
  navHistory.push(currentMachine + ':' + currentPath);
  var parts = currentPath.split('/');
  parts.pop();
  currentPath = parts.join('/');
  clearSelection();
  renderFileList();
}

function navigateToPath(path) {
  navHistory.push(currentMachine + ':' + currentPath);
  currentPath = path;
  clearSelection();
  renderFileList();
}

function renderPath() {
  var el = document.getElementById('files-path');
  if (currentView === 'machines') {
    el.innerHTML = '<span class="files-path-seg root">Machines</span>';
    return;
  }
  var html = '<span class="files-path-seg root" onclick="currentView=\'machines\'; currentMachine=\'\'; currentPath=\'\'; navHistory=[]; clearSelection(); renderMachineList();">Machines</span>';
  html += '<span class="files-path-sep">&#x203A;</span>';
  html += '<span class="files-path-seg" onclick="navigateToPath(\'\');">' + currentMachine + '</span>';
  if (currentPath) {
    var parts = currentPath.split('/');
    var acc = '';
    parts.forEach(function (p) {
      acc = acc ? acc + '/' + p : p;
      html += '<span class="files-path-sep">&#x203A;</span>';
      html += '<span class="files-path-seg" onclick="navigateToPath(\'' + acc + '\')">' + p + '</span>';
    });
  }
  el.innerHTML = html;
}

// ===== File List =====

function renderFileList() {
  currentView = 'files';
  document.getElementById('files-header').style.display = 'flex';
  document.getElementById('files-actionbar').style.display = 'flex';
  document.getElementById('btn-back').disabled = (navHistory.length === 0);
  document.getElementById('btn-up').disabled = false;
  var machineInfo = machines.find(function (m) { return m.name === currentMachine; });
  document.getElementById('btn-upload').disabled = !(machineInfo && machineInfo.fileShare === 'rw');
  renderPath();
  updateActionButtons();

  var key = currentMachine + ':' + currentPath;
  currentEntries = (mockFiles[key] || []).slice();
  currentEntries.sort(function (a, b) {
    if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  var html = '';
  currentEntries.forEach(function (entry, idx) {
    var entryPath = currentPath ? currentPath + '/' + entry.name : entry.name;
    var selClass = selectedIndices.has(idx) ? ' selected' : '';
    var dirClass = entry.isDir ? ' files-entry-dir' : '';

    html += '<div class="files-entry' + dirClass + selClass + '" data-idx="' + idx + '"'
      + ' onclick="onEntryClick(event, ' + idx + ')"'
      + ' ondblclick="onEntryDblClick(' + idx + ')">';

    if (entry.isDir) {
      html += '<span class="fe-name"><span class="fe-icon-dir"></span><span class="fe-label">' + entry.name + '</span></span>'
        + '<span class="fe-modified">' + fmtDate(entry.modTime) + '</span>'
        + '<span class="fe-type">File folder</span>'
        + '<span class="fe-size">' + (entry.items || '') + ' items</span>';
    } else {
      html += '<span class="fe-name"><span class="fe-icon-file"></span><span class="fe-label">' + entry.name + '</span></span>'
        + '<span class="fe-modified">' + fmtDate(entry.modTime) + '</span>'
        + '<span class="fe-type">' + (entry.type || '') + '</span>'
        + '<span class="fe-size">' + fmtSize(entry.size) + '</span>';
    }
    html += '</div>';
  });

  if (currentEntries.length === 0) {
    html = '<div class="files-empty">This folder is empty</div>';
  }

  document.getElementById('files-content').innerHTML = html;
  updateStatusBar();
}

// ===== Selection =====

function clearSelection() {
  selectedIndices.clear();
  lastClickedIndex = -1;
  updateActionButtons();
}

function onEntryClick(event, idx) {
  event.stopPropagation();

  if (event.ctrlKey || event.metaKey) {
    // Toggle this item
    if (selectedIndices.has(idx)) selectedIndices.delete(idx);
    else selectedIndices.add(idx);
    lastClickedIndex = idx;
  } else if (event.shiftKey && lastClickedIndex >= 0) {
    // Range select
    var start = Math.min(lastClickedIndex, idx);
    var end = Math.max(lastClickedIndex, idx);
    for (var i = start; i <= end; i++) selectedIndices.add(i);
  } else {
    // Single select
    selectedIndices.clear();
    selectedIndices.add(idx);
    lastClickedIndex = idx;
  }

  // Update visual state
  document.querySelectorAll('.files-entry').forEach(function (el) {
    var i = parseInt(el.getAttribute('data-idx'));
    el.classList.toggle('selected', selectedIndices.has(i));
  });

  updateActionButtons();
}

function onEntryDblClick(idx) {
  selectedIndices.clear();
  lastClickedIndex = -1;

  var entry = currentEntries[idx];
  if (!entry) return;

  if (entry.isDir) {
    var path = currentPath ? currentPath + '/' + entry.name : entry.name;
    navigateTo(path);
  } else {
    appendLog('Downloading ' + entry.name + '...');
    setTimeout(function () { appendLog('Downloaded ' + entry.name + ' (' + fmtSize(entry.size) + ')'); }, 500);
  }
}

function updateActionButtons() {
  var hasSelection = selectedIndices.size > 0;
  var machineInfo = machines.find(function (m) { return m.name === currentMachine; });
  var isWritable = machineInfo && machineInfo.fileShare === 'rw';
  document.getElementById('btn-download').disabled = !hasSelection;
  document.getElementById('btn-delete').disabled = !hasSelection || !isWritable;

  var info = document.getElementById('selection-info');
  if (hasSelection) {
    var fileCount = 0, dirCount = 0, totalSize = 0;
    selectedIndices.forEach(function (i) {
      var e = currentEntries[i];
      if (e) { if (e.isDir) dirCount++; else { fileCount++; totalSize += (e.size || 0); } }
    });
    var parts = [];
    if (fileCount) parts.push(fileCount + ' file' + (fileCount !== 1 ? 's' : ''));
    if (dirCount) parts.push(dirCount + ' folder' + (dirCount !== 1 ? 's' : ''));
    info.textContent = parts.join(', ') + ' selected' + (totalSize > 0 ? ' (' + fmtSize(totalSize) + ')' : '');
  } else {
    info.textContent = '';
  }
}

// Click on empty area clears selection
document.addEventListener('click', function (e) {
  if (currentView !== 'files') return;
  if (!e.target.closest('.files-entry') && !e.target.closest('.files-actionbar') && !e.target.closest('.files-header')) {
    clearSelection();
    document.querySelectorAll('.files-entry.selected').forEach(function (el) { el.classList.remove('selected'); });
  }
});

// ===== Status bar =====

function updateStatusBar() {
  var dirs = 0, files = 0, totalSize = 0;
  currentEntries.forEach(function (e) {
    if (e.isDir) dirs++; else { files++; totalSize += (e.size || 0); }
  });
  var parts = [];
  if (files) parts.push(files + ' file' + (files !== 1 ? 's' : ''));
  if (dirs) parts.push(dirs + ' folder' + (dirs !== 1 ? 's' : ''));
  var text = parts.join(', ') || 'Empty';
  var isRW = currentMachine === 'barn';
  document.getElementById('files-status').innerHTML = '<span>' + text + '</span>'
    + (totalSize > 0 ? '<span class="files-status-sep"></span><span>' + fmtSize(totalSize) + '</span>' : '')
    + '<span class="files-status-mode"><span class="files-status-dot ' + (isRW ? 'rw' : 'ro') + '"></span>' + (isRW ? 'read-write' : 'read-only') + '</span>';
}

// ===== Mock actions =====

function mockUpload() {
  var el = document.getElementById('files-progress');
  el.classList.add('active');
  document.getElementById('files-progress-label').textContent = 'Uploading new-file.yaml...';
  var fill = document.getElementById('files-progress-fill');
  var pct = document.getElementById('files-progress-pct');
  var w = 0;
  var iv = setInterval(function () {
    w += 4;
    fill.style.width = Math.min(w, 100) + '%';
    pct.textContent = Math.min(w, 100) + '%';
    if (w >= 100) {
      clearInterval(iv);
      appendLog('Uploaded new-file.yaml');
      setTimeout(function () { el.classList.remove('active'); fill.style.width = '0%'; }, 600);
    }
  }, 50);
}

function mockDownload() {
  selectedIndices.forEach(function (i) {
    var e = currentEntries[i];
    if (e) appendLog('Downloading ' + e.name + '...');
  });
}

function mockDelete() {
  var names = [];
  selectedIndices.forEach(function (i) { var e = currentEntries[i]; if (e) names.push(e.name); });
  if (confirm('Delete ' + names.join(', ') + '?')) {
    names.forEach(function (n) { appendLog('Deleted ' + n); });
    clearSelection();
    renderFileList();
  }
}

function mockRefresh(btn) {
  btn.style.animation = 'spin 0.8s linear';
  setTimeout(function () { btn.style.animation = ''; }, 800);
  if (currentView === 'machines') renderMachineList();
  else renderFileList();
}

function mockSort(el) {
  document.querySelectorAll('.fh-col .fh-sort-arrow').forEach(function (a) { a.remove(); });
  el.innerHTML += ' <span class="fh-sort-arrow">&#x25B2;</span>';
}

// ===== Utilities =====

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
  if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return bytes + ' B';
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var day = d.getDate();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return day + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function appendLog(msg) {
  var el = document.getElementById('log-output');
  var now = new Date().toISOString().replace('T', ' ').substring(0, 19) + 'Z';
  el.innerHTML += '<div>' + now + ' ' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

// ===== Init =====
appendLog('TelaVisor started');
appendLog('Profile loaded');
renderMachineList();
</script>
