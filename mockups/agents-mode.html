<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TelaVisor Mockup - Agents Mode</title>
<link rel="stylesheet" href="../cmd/telagui/frontend/src/style.css">
<style>
.topbar, .app-brand, .mode-toggle, .topbar-icon-btn, .topbar-btn, .mode-btn { -webkit-app-region: unset !important; }
.app-title-visor { color: var(--accent); }

/* ===== Agents Mode Layout ===== */

.agents-layout {
  display: flex; flex: 1; min-height: 0; overflow: hidden;
}

/* Sidebar */
.agents-sidebar {
  width: 240px; min-width: 200px; max-width: 400px;
  border-right: 1px solid var(--border); background: var(--surface);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.agents-sidebar-header {
  padding: 12px 16px 8px; font-size: 11px; text-transform: uppercase;
  color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.agents-sidebar-list { flex: 1; overflow-y: auto; }
.agents-sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; cursor: pointer; color: var(--text-muted);
  border-left: 3px solid transparent; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.agents-sidebar-item:hover { background: var(--surface-alt); color: var(--text); }
.agents-sidebar-item.active {
  background: var(--surface-alt); font-weight: 600; color: var(--text);
  border-left-color: var(--accent);
}
.agents-sidebar-item .machine-status-dot { width: 8px; height: 8px; margin-top: 0; flex-shrink: 0; }
.agents-sidebar-name { font-size: 13px; }
.agents-sidebar-version { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }
.agents-sidebar-footer {
  padding: 8px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; gap: 4px;
}

/* Detail pane */
.agents-detail {
  flex: 1; overflow-y: auto; padding: 24px 32px;
}
.agents-detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); font-size: 13px;
}

/* Detail header (reuse status-header style) */
.agent-detail-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.agent-detail-title { font-size: 20px; font-weight: 700; }
.agent-detail-status {
  font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600;
}
.agent-detail-status.online { background: rgba(94,232,158,0.15); color: var(--accent); }
.agent-detail-status.offline { background: rgba(148,163,184,0.15); color: var(--text-muted); }

/* Service tags (same as hub machines view) */
.agent-svc-tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 16px; }
.agent-svc-tag {
  font-size: 11px; padding: 3px 10px; border-radius: 4px;
  background: var(--surface-alt); border: 1px solid var(--border);
  font-family: var(--mono);
}

/* File share badge */
.agent-fs-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 3px; display: inline-block;
}
.agent-fs-badge.rw { background: rgba(94,232,158,0.1); color: var(--accent); border: 1px solid rgba(94,232,158,0.2); }
.agent-fs-badge.ro { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }

/* Update row inside a settings-group */
.agent-update-row {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
}
.agent-update-current { font-family: var(--mono); font-size: 12px; }
.agent-update-arrow { color: var(--text-muted); font-size: 14px; }
.agent-update-latest { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 600; }
.agent-update-note { font-size: 11px; color: var(--text-muted); margin-left: auto; }

/* Config preview */
.agent-config-box {
  background: #1e293b; color: #e2e8f0; font-family: var(--mono); font-size: 11px;
  padding: 12px 16px; white-space: pre; overflow-x: auto; line-height: 1.5;
  max-height: 200px; overflow-y: auto;
}

/* Log preview */
.agent-log-box {
  background: #0f172a; color: #94a3b8; font-family: var(--mono); font-size: 11px;
  padding: 12px 16px; overflow-x: auto; line-height: 1.5;
  max-height: 180px; overflow-y: auto;
}
.log-ts { color: #64748b; }
.log-msg { color: #cbd5e1; }

/* Card action row (buttons inside a card) */
.card-actions {
  display: flex; gap: 4px; padding: 10px 16px; border-bottom: 1px solid var(--surface-alt);
}
.card-actions:last-child { border-bottom: none; }
</style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="app-brand" title="About TelaVisor">
        <img src="../cmd/telagui/frontend/src/logo.png" class="app-logo" alt="Tela" onerror="this.style.display='none'">
        <span class="app-title">Tela<span class="app-title-visor">Visor</span></span>
      </a>
    </div>
    <div class="topbar-center">
      <div class="mode-toggle">
        <button class="mode-btn">Clients</button>
        <button class="mode-btn middle active">Agents</button>
        <button class="mode-btn">Hubs</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-icon-btn topbar-conn-btn" style="color: var(--accent); border-color: var(--accent);" title="Connected">&#x1F517;</button>
      <button class="topbar-icon-btn" title="About">i</button>
      <button class="topbar-icon-btn" title="Settings">&#x2699;</button>
      <button class="topbar-icon-btn" title="Quit" style="color: var(--danger);">&#x2715;</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="main-tab-bar" role="tablist">
    <button class="main-tab active">Agents</button>
    <div class="tab-bar-spacer"></div>
    <button class="topbar-btn connect-btn" style="background: var(--danger); color: #fff; border-color: var(--danger);">Disconnect</button>
  </div>

  <!-- AGENTS LAYOUT -->
  <div class="tab-pane" role="tabpanel" style="display: flex;">
    <div class="agents-layout">

      <!-- Sidebar -->
      <div class="agents-sidebar">
        <div class="agents-sidebar-header">
          <span>Agents</span>
          <button type="button" class="files-nav-btn" onclick="mockRefresh(this)" title="Refresh" style="width:22px;height:22px;font-size:12px;">&#x21BB;</button>
        </div>
        <div class="agents-sidebar-list" id="agents-list">
          <div class="agents-sidebar-item active" onclick="showAgent('barn', this)">
            <span class="machine-status-dot online"></span>
            <div>
              <div class="agents-sidebar-name">barn</div>
              <div class="agents-sidebar-version">v0.2.197</div>
            </div>
          </div>
          <div class="agents-sidebar-item" onclick="showAgent('telaboard', this)">
            <span class="machine-status-dot online"></span>
            <div>
              <div class="agents-sidebar-name">telaboard</div>
              <div class="agents-sidebar-version">v0.2.197</div>
            </div>
          </div>
          <div class="agents-sidebar-item" onclick="showAgent('gohub', this)">
            <span class="machine-status-dot online"></span>
            <div>
              <div class="agents-sidebar-name">gohub</div>
              <div class="agents-sidebar-version">v0.2.197</div>
            </div>
          </div>
          <div class="agents-sidebar-item" onclick="showAgent('staging-db', this)">
            <span class="machine-status-dot offline"></span>
            <div>
              <div class="agents-sidebar-name">staging-db</div>
              <div class="agents-sidebar-version">v0.2.190</div>
            </div>
          </div>
        </div>
        <div class="agents-sidebar-footer">
          <button type="button" class="tb-btn" style="flex:1;">Pair Agent</button>
        </div>
      </div>

      <!-- Detail pane -->
      <div class="agents-detail" id="agents-detail"></div>
    </div>
  </div>

  <!-- Log panel -->
  <div style="height: 100px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column;">
    <div style="display: flex; align-items: center; padding: 4px 12px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 16px;">
      <span style="font-size: 11px; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span> TelaVisor</span>
      <span style="font-size: 11px; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span> tela</span>
      <span style="font-size: 11px; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span> Commands</span>
    </div>
    <div style="padding: 6px 12px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); overflow-y: auto; flex: 1;">
      <div>2026-03-21T11:38:59Z Connected (4 machines, 3 online)</div>
    </div>
  </div>
</div>

<script>
var agents = {
  barn: {
    name: 'barn', online: true, version: 'v0.2.197', hub: 'gohub.parkscomputing.com',
    hostname: 'BARN', os: 'windows', arch: 'amd64', target: '127.0.0.1', sessions: 2,
    uptime: '2d 14h 32m', lastSeen: '21 Mar 2026 11:42',
    services: ['SSH :22', 'RDP :3389'],
    fileShare: { status: 'rw', dir: 'C:\\TelaShare', maxFile: '50 MB', blocked: '.exe .bat .cmd .ps1 .sh' },
    latestVersion: 'v0.2.200',
    config: 'hub: wss://gohub.parkscomputing.com\ntoken: 7bf042ce...446d62\nmachines:\n  - name: barn\n    fileShare:\n      enabled: true\n      directory: C:\\TelaShare\n      writable: true\n    services:\n      - port: 22\n        name: SSH\n      - port: 3389\n        name: RDP\n    target: 127.0.0.1'
  },
  telaboard: {
    name: 'telaboard', online: true, version: 'v0.2.197', hub: 'gohub.parkscomputing.com',
    hostname: 'telaboard', os: 'linux', arch: 'amd64', target: '127.0.0.1', sessions: 1,
    uptime: '5d 2h 10m', lastSeen: '21 Mar 2026 11:40',
    services: ['Web :8000', 'API :8080', 'DBAdmin :8082', 'PostgreSQL :5432'],
    fileShare: { status: 'none' },
    latestVersion: 'v0.2.197',
    config: 'hub: wss://gohub.parkscomputing.com\nmachines:\n  - name: telaboard\n    services:\n      - port: 8000\n        name: Web\n      - port: 8080\n        name: API'
  },
  gohub: {
    name: 'gohub', online: true, version: 'v0.2.197', hub: 'gohub.parkscomputing.com',
    hostname: 'gohub-container', os: 'linux', arch: 'amd64', target: '127.0.0.1', sessions: 0,
    uptime: '1d 8h 45m', lastSeen: '21 Mar 2026 11:41',
    services: ['SSH :22'],
    fileShare: { status: 'ro', dir: '/app/data', maxFile: '10 MB', blocked: '' },
    latestVersion: 'v0.2.197',
    config: 'hub: wss://gohub.parkscomputing.com\nmachines:\n  - name: gohub\n    services:\n      - port: 22\n        name: SSH'
  },
  'staging-db': {
    name: 'staging-db', online: false, version: 'v0.2.190', hub: 'devhub.awansaya.net',
    hostname: 'staging-db', os: 'linux', arch: 'amd64', target: '127.0.0.1', sessions: 0,
    uptime: '-', lastSeen: '19 Mar 2026 16:30',
    services: ['PostgreSQL :5432'],
    fileShare: { status: 'none' },
    latestVersion: 'v0.2.197',
    config: null
  }
};

function showAgent(name, el) {
  document.querySelectorAll('.agents-sidebar-item').forEach(function (e) { e.classList.remove('active'); });
  if (el) el.classList.add('active');

  var a = agents[name];
  if (!a) return;

  var isOnline = a.online;
  var statusClass = isOnline ? 'online' : 'offline';
  var statusText = isOnline ? 'Online' : 'Offline';
  var dis = isOnline ? '' : ' disabled';

  var html = '<div class="agent-detail-header">'
    + '<div class="agent-detail-title">' + esc(a.name) + '</div>'
    + '<span class="agent-detail-status ' + statusClass + '">' + statusText + '</span>'
    + '</div>';

  // ── Agent Info card ──
  html += card('Agent Info',
    row('Version', mono(a.version))
    + row('Hub', '<a href="#" style="color:var(--accent);text-decoration:none;">' + esc(a.hub) + '</a>')
    + row('Hostname', mono(a.hostname))
    + row('Platform', mono(a.os + '/' + a.arch))
    + row('Uptime', mono(a.uptime))
    + row('Last seen', mono(a.lastSeen))
    + row('Target host', mono(a.target))
    + row('Active sessions', mono(a.sessions))
  );

  // ── Services card ──
  var svcHtml = '<div class="agent-svc-tags">';
  a.services.forEach(function (s) { svcHtml += '<span class="agent-svc-tag">' + esc(s) + '</span>'; });
  svcHtml += '</div>';
  html += card('Services', svcHtml);

  // ── File Share card ──
  if (a.fileShare.status !== 'none') {
    var badgeCls = a.fileShare.status === 'rw' ? 'rw' : 'ro';
    var badgeText = a.fileShare.status === 'rw' ? 'read-write' : 'read-only';
    html += card('File Share',
      row('Status', '<span class="agent-fs-badge ' + badgeCls + '">' + badgeText + '</span>')
      + row('Directory', mono(a.fileShare.dir))
      + row('Max file size', mono(a.fileShare.maxFile))
      + (a.fileShare.blocked ? row('Blocked extensions', mono(a.fileShare.blocked)) : '')
    );
  } else {
    html += card('File Share', row('Status', '<span style="color:var(--text-muted)">Not configured</span>'));
  }

  // ── Update card ──
  var isOutdated = a.version !== a.latestVersion;
  var updateContent = '<div class="agent-update-row">'
    + '<span class="agent-update-current">' + esc(a.version) + '</span>';
  if (isOutdated) {
    updateContent += '<span class="agent-update-arrow">&#x2192;</span>'
      + '<span class="agent-update-latest">' + esc(a.latestVersion) + '</span>'
      + '<span class="agent-update-note">Update available</span>'
      + '<button type="button" class="tb-btn"' + dis + ' style="margin-left:8px;">Update</button>';
  } else {
    updateContent += '<span class="agent-update-note">Up to date</span>';
  }
  updateContent += '</div>';
  if (isOutdated) {
    updateContent += '<div style="padding:0 16px 10px;font-size:11px;color:var(--text-muted);">'
      + 'Stops the agent, replaces the binary with a watchdog for automatic rollback, then restarts.</div>';
  }
  html += card('Update', updateContent);

  // ── Configuration card ──
  var configActions = '<div class="card-actions">'
    + '<button type="button" class="tb-btn"' + dis + '>Pull Config</button>'
    + '<button type="button" class="tb-btn"' + dis + '>Push Config</button>'
    + '<button type="button" class="tb-btn"' + dis + '>Restart Agent</button>'
    + '</div>';
  var configPreview = a.config
    ? '<div class="agent-config-box">' + esc(a.config) + '</div>'
    : '<div style="padding:12px 16px;font-size:12px;color:var(--text-muted);">Agent is offline. Configuration unavailable.</div>';
  html += card('Configuration', configActions + configPreview);

  // ── Recent Log card ──
  var logActions = '<div class="card-actions">'
    + '<button type="button" class="tb-btn"' + dis + '>View Full Log</button>'
    + '<button type="button" class="tb-btn"' + dis + '>Download Log</button>'
    + '</div>';
  var logContent;
  if (isOnline) {
    logContent = '<div class="agent-log-box">'
      + logLine('11:38:59', 'registered as: ' + a.name + ' -- waiting for sessions')
      + logLine('11:38:59', 'WireGuard tunnel up -- agent=10.77.62.1 helper=10.77.62.2')
      + logLine('11:38:59', 'forwarding 10.77.62.1:22 -> 127.0.0.1:22')
      + logLine('11:39:04', '[fileshare] listening on 10.77.62.1:17377 (read-write)')
      + logLine('11:39:04', '[fileshare] subscribed to events')
      + logLine('11:42:10', '[fileshare] list "": 3 entries')
      + logLine('11:42:15', '[fileshare] read "test-for-echo.txt": 52 bytes')
      + '</div>';
  } else {
    logContent = '<div style="padding:12px 16px;font-size:12px;color:var(--text-muted);">Agent is offline. Log unavailable.</div>';
  }
  html += card('Recent Log', logActions + logContent);

  // ── Danger Zone card ──
  html += '<div class="settings-group" style="border-color:rgba(239,68,68,0.3);">'
    + '<div class="settings-group-header" style="color:var(--danger);">Danger Zone</div>'
    + '<div class="card-actions">'
    + '<button type="button" class="tb-btn tb-delete-btn"' + dis + '>Stop Agent</button>'
    + '<button type="button" class="tb-btn tb-delete-btn">Unregister</button>'
    + '</div></div>';

  document.getElementById('agents-detail').innerHTML = html;
}

function card(title, content) {
  return '<div class="settings-group"><div class="settings-group-header">' + title + '</div>' + content + '</div>';
}

function row(label, value) {
  return '<div class="settings-row"><div class="settings-label">' + label + '</div><div class="settings-value">' + value + '</div></div>';
}

function mono(v) {
  return '<span style="font-family:var(--mono);font-size:12px;">' + esc(String(v)) + '</span>';
}

function logLine(ts, msg) {
  return '<div style="white-space:nowrap;"><span class="log-ts">' + ts + '</span> <span class="log-msg">' + esc(msg) + '</span></div>';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mockRefresh(btn) {
  btn.style.animation = 'spin 0.8s linear';
  setTimeout(function () { btn.style.animation = ''; }, 800);
}

// Show barn by default
showAgent('barn', document.querySelector('.agents-sidebar-item.active'));
</script>
</body>
</html>
