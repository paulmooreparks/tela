<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="topbar-left">
        <span class="app-title">Tela</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" id="add-portal-btn" onclick="openAddPortalModal()">Add Portal</button>
        <button class="topbar-btn" id="toggle-log-btn" onclick="toggleLog()">Command Log</button>
        <button class="topbar-btn" onclick="refreshAll()">Refresh</button>
      </div>
    </div>

    <div class="main-content">
      <div class="sidebar" id="org-tree">
        <div class="sidebar-empty" id="sidebar-empty">
          <p>No portals connected.</p>
          <p class="hint">Click <strong>Add Portal</strong> to connect to an Awan Saya portal and see your hubs and machines.</p>
        </div>
      </div>
      <div class="detail-pane" id="detail-pane">
        <div class="empty-state">
          <p>Select a hub or machine from the sidebar.</p>
        </div>
      </div>
    </div>

    <!-- Command log drawer -->
    <div class="log-drawer hidden" id="log-drawer">
      <div class="log-drawer-header">
        <span class="log-drawer-title">Command Log</span>
        <button class="topbar-btn" onclick="toggleLog()">Close</button>
      </div>
      <div class="log-content" id="log-content">
        <p class="empty-hint">Actions you take will appear here with their CLI equivalents.</p>
      </div>
    </div>
  </div>

  <!-- Add Portal Modal -->
  <div class="modal-overlay hidden" id="add-portal-modal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3>Add Portal</h3>
        <button class="modal-close" onclick="closeAddPortalModal()">&times;</button>
      </div>
      <form id="add-portal-form" onsubmit="submitAddPortal(event)">
        <div class="form-group">
          <label for="portal-url">Portal URL</label>
          <input type="url" id="portal-url" value="https://awansaya.net" required>
        </div>
        <div class="form-group">
          <label for="portal-email">Email</label>
          <input type="email" id="portal-email" required>
        </div>
        <div class="form-group">
          <label for="portal-password">Password</label>
          <input type="password" id="portal-password" required>
        </div>
        <div id="portal-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeAddPortalModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="portal-submit-btn">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/src/app.js"></script>
</body>
</html>
