<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="topbar-left">
        <span class="app-title">Tela</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn update-btn hidden" id="update-btn" onclick="restartToUpdate()">Restart to Update</button>
        <button class="topbar-btn connect-btn" id="connect-btn" onclick="toggleConnection()">Connect</button>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="main-tab-bar">
      <button class="main-tab active" onclick="switchTab('profile', this)">Profile</button>
      <button class="main-tab" onclick="switchTab('terminal', this)">Terminal</button>
      <button class="main-tab" onclick="switchTab('log', this)">Command Log</button>
    </div>

    <!-- Profile tab -->
    <div class="tab-pane" id="tab-profile">
      <div class="main-content">
        <div class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <button class="btn-primary btn-sm" onclick="openAddHubModal()">Add Hub</button>
            <button class="btn-secondary btn-sm" onclick="refreshAll()">Refresh</button>
          </div>
          <div id="sidebar-content">
            <p class="loading">Loading hubs...</p>
          </div>
        </div>
        <div class="detail-pane" id="detail-pane">
          <div class="empty-state">
            <p>Select a hub or machine from the sidebar.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Terminal tab -->
    <div class="tab-pane hidden" id="tab-terminal">
      <div class="terminal-pane">
        <div class="terminal-header">
          <span class="terminal-status" id="terminal-status">Disconnected</span>
          <label class="verbose-toggle"><input type="checkbox" id="verbose-check" onchange="setVerbose(this.checked)"> Verbose</label>
        </div>
        <pre class="terminal-output" id="terminal-output">Not connected.</pre>
      </div>
    </div>

    <!-- Command Log tab -->
    <div class="tab-pane hidden" id="tab-log">
      <div class="log-pane" id="log-content">
        <p class="empty-hint">Actions you take will appear here with their CLI equivalents.</p>
      </div>
    </div>
  </div>

  <!-- Add Hub Modal -->
  <div class="modal-overlay hidden" id="add-hub-modal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3>Add Hub</h3>
        <button class="modal-close" onclick="closeAddHubModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="tab-bar">
          <button class="tab active" data-tab="manual" onclick="showAddHubTab('manual', this)">Manual</button>
          <button class="tab" data-tab="docker" onclick="showAddHubTab('docker', this)">Docker</button>
        </div>

        <div class="tab-content" id="tab-manual">
          <form onsubmit="submitAddHub(event)">
            <div class="form-group">
              <label for="hub-url">Hub URL</label>
              <input type="text" id="hub-url" placeholder="wss://myhub.example.com" required>
            </div>
            <div class="form-group">
              <label for="hub-token">Token</label>
              <input type="password" id="hub-token" placeholder="Paste hub token" required>
            </div>
            <div id="add-hub-error" class="error-msg hidden"></div>
            <div class="modal-actions">
              <button type="button" class="btn-secondary" onclick="closeAddHubModal()">Cancel</button>
              <button type="submit" class="btn-primary">Add Hub</button>
            </div>
          </form>
        </div>

        <div class="tab-content hidden" id="tab-docker">
          <p class="tab-desc">Extract a token from a running telahubd Docker container.</p>
          <div class="form-group">
            <label>Container</label>
            <select id="docker-container"><option value="">Loading...</option></select>
            <button type="button" class="btn-link" onclick="refreshDockerContainers()">Refresh</button>
          </div>
          <div class="form-group">
            <label>Hub URL (external)</label>
            <input type="text" id="docker-hub-url" placeholder="wss://myhub.example.com">
          </div>
          <div class="form-row">
            <button type="button" class="btn-primary" onclick="dockerGetOwner()">Get Owner Token</button>
            <button type="button" class="btn-secondary" onclick="dockerGetViewer()">Get Viewer Token</button>
          </div>
          <div id="docker-result" class="hidden">
            <div class="form-group">
              <label>Token</label>
              <div class="token-display" id="docker-token-value"></div>
            </div>
            <button type="button" class="btn-primary" onclick="dockerAddHub()">Add This Hub</button>
          </div>
          <div id="docker-error" class="error-msg hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/src/app.js"></script>
</body>
</html>
