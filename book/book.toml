# mdBook configuration for the Tela documentation site.
#
# Build with `mdbook build` (output to ./book/), preview with `mdbook serve`.
# CI publishes to GitHub Pages on every push to main via
# .github/workflows/docs.yml.
#
# All chapter files in src/ either contain content directly or include the
# canonical .md file from the repository root via mdBook's {{#include}}
# preprocessor. The repo-root files remain the single source of truth so
# the docs can never drift from the code.

[book]
title = "Tela: The Complete Reference"
description = "FOSS encrypted remote-access fabric using WireGuard tunnels"
authors = ["Paul Parks"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/paulmooreparks/tela"
edit-url-template = "https://github.com/paulmooreparks/tela/edit/main/{path}"
site-url = "/tela/"
mathjax-support = false
# additional-css and additional-js for mermaid are added by
# `mdbook-mermaid install .`, which the CI workflow runs after
# installing the preprocessor binary. Local builds need the same step
# (one time): `cd book && mdbook-mermaid install .`

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 1

[preprocessor.index]

[preprocessor.links]

# mdbook-mermaid renders ```mermaid fenced code blocks via mermaid.js.
# The CI workflow installs mdbook-mermaid alongside mdbook before
# building. Locally, run `cargo install mdbook-mermaid` once.
[preprocessor.mermaid]
command = "mdbook-mermaid"
