tunnel: b2594007-2b75-4103-bfbc-f54f7754f62a  # Your tunnel UUID
credentials-file: C:\Windows\System32\config\systemprofile\.cloudflared\b2594007-2b75-4103-bfbc-f54f7754f62a.json

ingress:
  # RDP access - use a subdomain for security
  - hostname: barn.parkscomputing.com
    service: rdp://localhost:3389

  # Route parkscomputing.com to your local container
  - hostname: parkscomputing.com
    service: http://localhost:80

  # Route www.parkscomputing.com to your local container
  - hostname: www.parkscomputing.com
    service: http://localhost:80

  # Route padmajairam.com to local container on port 8085
  - hostname: padmajairam.com
    service: http://localhost:8085

  # Route www.padmajairam.com to local container on port 8085
  - hostname: www.padmajairam.com
    service: http://localhost:8085

  # Tela Hub — HTTP + WebSocket on one port (docker-compose publishes 3000->8080)
  - hostname: tela.awansatu.net
    service: http://localhost:3000

  # Awan Satu portal
  - hostname: awansatu.net
    service: http://localhost:3001

  - hostname: www.awansatu.net
    service: http://localhost:3001

  # Catch-all rule (required)
  - service: http_status:404
